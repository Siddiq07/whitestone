<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Business System</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:20px;}
h2{text-align:center;}
.top-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
input,button{padding:8px;}
button{background:#1b5e20;color:white;border:none;border-radius:5px;cursor:pointer;}
.client{background:white;padding:15px;margin-bottom:15px;border-radius:8px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
.summary{background:#fff3e0;padding:10px;margin-bottom:15px;border-radius:8px;}
</style>
</head>
<body>

<h2>🥛 Milk Daily System</h2>

<div class="top-bar">
<input type="number" id="stockInput" placeholder="Enter Today Stock (Litre)">
<button onclick="saveStock()">Save Stock</button>
<button onclick="sendWhatsApp()">📲 Send Report</button>
</div>

<div class="summary" id="summary"></div>

<div class="top-bar">
<input type="text" id="clientName" placeholder="Add Client Name">
<button onclick="addClient()">+ Add Client</button>
</div>

<div id="clients"></div>

<script>

// 🔥 Firebase Config
firebase.initializeApp({
  apiKey: "AIzaSyCnLHWvXBIBFaQ9s6S_gCN9jJFG6oWDetk",
  authDomain: "milk-7bb9b.firebaseapp.com",
  databaseURL: "https://milk-7bb9b-default-rtdb.firebaseio.com",
  projectId: "milk-7bb9b"
});

const db = firebase.database();
const BOX_LITRE = 12;

function todayKey(){
    return new Date().toLocaleDateString("en-GB");
}

// Save Stock
function saveStock(){
    let stock = Number(document.getElementById("stockInput").value);
    db.ref("dailyReports/"+todayKey()+"/stock").set(stock);
}

// Add Client
function addClient(){
    let name=document.getElementById("clientName").value.trim();
    if(!name) return;

    db.ref("dailyReports/"+todayKey()+"/clients").push({
        name:name,
        green:{box:0,litre:0},
        blue:{box:0,litre:0},
        red:{box:0,litre:0},
        curd:{box:0,litre:0},
        thick:{box:0,litre:0}
    });

    document.getElementById("clientName").value="";
}

// Real-time load
db.ref("dailyReports/"+todayKey()).on("value",snap=>{
    let data=snap.val();
    if(!data) return;

    document.getElementById("stockInput").value=data.stock||0;

    let totalSupplied=0;
    let container=document.getElementById("clients");
    container.innerHTML="";

    if(data.clients){
        for(let id in data.clients){

            let c=data.clients[id];
            totalSupplied+=calcTotal(c);

            container.innerHTML+=`
            <div class="client">
            <h3>${c.name}</h3>
            ${buildTable(c,id)}
            </div>
            `;
        }
    }

    let stock=data.stock||0;
    let balance=stock-totalSupplied;

    document.getElementById("summary").innerHTML=
    `<b>Stock:</b> ${stock} Litre |
     <b>Supplied:</b> ${totalSupplied} Litre |
     <b>Balance:</b> ${balance} Litre`;
});

// Build table
function buildTable(c,id){
    return `
    <table>
    <tr><th>Product</th><th>Box</th><th>Litre</th></tr>
    ${row("Green",c.green,id,"green")}
    ${row("Blue",c.blue,id,"blue")}
    ${row("Red",c.red,id,"red")}
    ${row("Curd",c.curd,id,"curd")}
    ${row("Thick",c.thick,id,"thick")}
    </table>
    `;
}

function row(name,data,id,key){
    return `
    <tr>
    <td>${name}</td>
    <td><input type="number" value="${data.box}" 
    onchange="updateBox('${id}','${key}',this.value)"></td>
    <td>${data.litre}</td>
    </tr>
    `;
}

// Update Box -> auto convert
function updateBox(id,key,value){
    let box=Number(value);
    let litre=box*BOX_LITRE;

    db.ref("dailyReports/"+todayKey()+"/clients/"+id+"/"+key).set({
        box:box,
        litre:litre
    });
}

// Calculate total litre
function calcTotal(c){
    let sum=0;
    for(let p in c){
        if(p==="name") continue;
        sum+=c[p].litre||0;
    }
    return sum;
}

// WhatsApp
function sendWhatsApp(){

    db.ref("dailyReports/"+todayKey()).once("value").then(snap=>{
        let data=snap.val();
        if(!data) return;

        let message="*Milk Report*\nDate: "+todayKey()+"\n\n";
        let total=0;

        for(let id in data.clients){
            let c=data.clients[id];
            let block="";

            ["green","blue","red","curd","thick"].forEach(p=>{
                if(c[p].box>0){
                    block+=p.charAt(0).toUpperCase()+p.slice(1)
                    +" "+c[p].box+" Box ("+c[p].litre+" L)\n";
                    total+=c[p].litre;
                }
            });

            if(block!=""){
                message+="*"+c.name+"*\n"+block+"\n";
            }
        }

        message+="Total Supplied: "+total+" Litre\n";
        message+="Balance: "+(data.stock-total)+" Litre";

        window.open("https://wa.me/919449244108?text="+encodeURIComponent(message));
    });
}

</script>
</body>
</html>
